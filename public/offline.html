<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Minevine — Offline</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        text-align: center;
      }
      h1 { font-size: 1.5rem; margin: 0 0 0.75rem; }
      p { margin: 0; color: #94a3b8; line-height: 1.5; max-width: 22rem; }
      a {
        display: inline-block;
        margin-top: 1.25rem;
        padding: 0.75rem 1.25rem;
        background: #6366f1;
        color: white;
        text-decoration: none;
        font-weight: 700;
        border-radius: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>You’re offline</h1>
      <p>Check your internet connection, then try opening Minevine again.</p>
      <a href="/">Try again</a>
    </div>
  </body>
</html>
